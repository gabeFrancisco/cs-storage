<app-modal title="Selecionar produto" [isOpen]="show" (closed)="close()">
    <div class="w-full flex flex-row items-center align-center mb-2">
        <label for="search" class="mr-2">Pesquisar</label>
        <input placeholder="Digite aqui o produto" type="text" name="search" id="search" class="txt-input">
    </div>

    <div class="w-full p-1 border rounded border-slate-300 flex flex-row items-center align-center mb-2">
        <label for="search" class="mr-2">Produto selecionado: </label>
        <p class="text-blue-700">{{ selectedProduct?.id}} - {{ selectedProduct?.name }}</p>
    </div>

    <div class="overflow-y-auto border relative max-h-[45dvh]">
        <table class="table-fixed text-sm text-left rtl:text-right ">
            <thead class="text-sm bg-gray-50  border-b shadow-sm ">
                <!-- Table header -->
                <tr class="border-b">
                    <th class="font-normal border-r w-20 p-2">Código</th>
                    <th class="font-normal border-r w-56 p-2">Nome</th>
                    <th class="font-normal border-r w-32 p-2">Preço</th>
                </tr>
            </thead>

            <!-- Table body -->
            <tbody class="overflow-y-auto">
                <tr *ngIf="loading" class="text-center text-gray-500 text-lg">
                    Carregando...
                </tr>
                <tr (click)="selectProduct(item.id!)" class="items-center bg-white hover:bg-blue-200 cursor-pointer"
                    [ngClass]="{
                    'bg-blue-300': selectedProduct?.id === item.id
                }" *ngFor="let item of products">
                    <td class="border-r text-center text-neutral-500 w-20 p-1.5">
                        {{ item.id }}
                    </td>
                    <td class="font-normal border-r truncate p-1.5">{{ item.name }}</td>
                    <td class="w-32 text-emerald-700 border-r truncate p-1.5">
                        R${{ item.price.toFixed(2) }}
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="flex flex-row justify-center mt-3">
        <app-button variant="primary">Confirmar!</app-button>
    </div>
</app-modal>
