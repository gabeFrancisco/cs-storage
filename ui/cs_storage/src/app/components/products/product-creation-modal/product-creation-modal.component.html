<app-modal title="Novo produto" [isOpen]="show" (closed)="close()">
	<form (ngSubmit)="submit()" [formGroup]="productForm" #formDir="ngForm"
		class="max-w-xl mx-auto flex flex-col space-y-1">
		<div class="flex items-baseline">
			<label class="w-20 text-sm text-right mr-2" for="name">Nome</label>
			<div class="flex flex-col">
				<input type="text" class="border w-full border-gray-400" formControlName="name" required />
				<small class="text-red-500" *ngIf="productForm.get('name')!.invalid && formDir.submitted">Nome é
					obrigatório!</small>
			</div>
		</div>
		<div class="flex items-baseline">
			<label class="w-20 text-sm text-right mr-2" for="description">Descrição</label>
			<div class="flex flex-col">
				<textarea class="border w-full border-gray-400" formControlName="description" required></textarea>
			</div>
		</div>
		<div class="flex items-baseline">
			<label class="w-20 text-sm text-right mr-2" for="category_id">Categoria</label>
			<div class="flex flex-col">
				<select class="border border-gray-400 bg-white" formControlName="category_id" required>
					<option *ngFor="let category of categories" [value]="category.id">{{ category.name }}</option>
				</select>
				<small class="text-red-500" *ngIf="productForm.get('category_id')!.invalid && formDir.submitted">Nome é
					obrigatório!</small>

			</div>
		</div>
		<div class="flex items-baseline">
			<label class="w-20 text-sm text-right mr-2" for="quantity">Quantidade</label>
			<div class="flex flex-col">
				<input type="number" class="border w-full border-gray-400" formControlName="quantity" required />
				<small class="text-red-500" *ngIf="productForm.get('quantity')!.invalid && formDir.submitted">Quantidade
					é
					obrigatório!</small>
			</div>
		</div>
		<div class="flex items-baseline">
			<label class="w-20 text-sm text-right mr-2" for="price">Preço</label>
			<div class="flex flex-col">
				<input type="number" class="border w-full border-gray-400" formControlName="price" required />
				<small class="text-red-500" *ngIf="productForm.get('price')!.invalid && formDir.submitted">Quantidade é
					obrigatório!</small>
			</div>
		</div>
		<div class="flex items-baseline">
			<label class="text-sm w-20 text-right mr-2" for="product_type">Tipo</label>
			<select class="bg-white border my-1 border-gray-400" formControlName="product_type">
				<option [ngValue]="0">Produto</option>
				<option [ngValue]="1">Serviço</option>
			</select>
		</div>
		<button type="submit" class="btn-green form-btn">
			Novo Produto!
		</button>
	</form>
</app-modal>
