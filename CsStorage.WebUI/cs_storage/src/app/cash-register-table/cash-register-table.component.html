<div class="w-full border border-gray-300 rounded">
  <div class="p-2 font-bold flex flex-row text-gray-600 justify-between items-center bg-gray-100">
    <span class="font-bold ">Caixa</span>
    <button
      type="button"
      (click)="openCashPostModal()"
      class="btn-green px-4 font-bold text-xl"
    >
      +
    </button>
  </div>
  <div class="relative overflow-x-auto">
    <div style="max-height: 50dvh">
      <table class="w-full text-sm text-left rtl:text-right dark:text-gray-400">
        <thead class="text-sm bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
          <!-- Table header -->
          <tr>
            <th class="font-thin p-2">Data</th>
            <th class="font-thin p-2">Descrição</th>
            <th class="font-thin p-2">Tipo</th>
            <th class="font-thin p-2">Valor</th>
            <th class="font-thin text-center p-2">Ações</th>
          </tr>
        </thead>

        <!-- Table body -->
        <tbody>
          <tr class="items-center" *ngFor="let item of registers">
            <th class="font-thin p-1.5">
              {{ item.createdAt | date : "dd/MM/yyyy" }}
            </th>
            <th class="font-thin p-1.5">{{ item.description }}</th>
            <th class="font-thin p-1.5">{{ item.paymentType }}</th>
            <th class="font-thin p-1.5">{{ item.value }}</th>
            <th class="font-thin text-center">
              <button class="btn-primary text-sm mr-1">Editar</button>
              <button type="button" (click)="deleteCashRegister(item.id!)" class="btn-red text-sm mr-1">Remover</button>
            </th>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
