<div
  *ngIf="show"
  class="absolute top-0 left-0 w-screen z-50 h-screen bg-gray-100 bg-opacity-75 flex flex-col justify-center items-center"
>
  <div class="-mt-48 border border-gray-400 shadow w-1/3 bg-gray-50">
    <div
      class="bg-gray-100 border-b py-1 px-2 flex flex-row justify-between text-gray-700 text-center"
    >
      Novo registro
      <button
        (click)="close()"
        type="button"
        class="font-bold hover:text-red-500"
      >
        X
      </button>
    </div>
    <div class="p-5">
      <form
        (ngSubmit)="submit()"
        [formGroup]="cashForm"
        #formDir="ngForm"
        class="flex flex-col p-1 justify-between sticky top-0"
      >
        <div class="flex flex-col">
          <small
            class="text-red-500"
            *ngIf="
              description.invalid && formDir.submitted
            "
            >Descrição é obrigatória!</small
          >
          <div class="mr-1 mb-2 flex flex-row items-center">
            <label class="text-sm mr-1" for="description">Descrição</label>
            <input
              type="text"
              class="border w-full border-gray-400"
              formControlName="description"
              required
            />
          </div>
          <div class="mr-1 mb-2 flex flex-row">
            <label class="text-sm mr-1" for="paymenttype">Tipo</label>
            <select
              class="bg-white border border-gray-400"
              formControlName="paymentType"
            >
              <option [ngValue]="0">Dinheiro</option>
              <option [ngValue]="1">Débito</option>
              <option [ngValue]="2">Crédito</option>
              <option [ngValue]="3">Pix</option>
              <option [ngValue]="4">Depósito</option>
            </select>
          </div>
        </div>

        <div class="flex flex-col">
          <small
            class="text-red-500"
            *ngIf="value.invalid && formDir.submitted"
            >Valor deve ser maior que 0!</small
          >
          <div class="mb-2 flex flex-row items-center">
            <label class="text-sm mr-1" for="value">Valor</label>
            <input
              type="number"
              formControlName="value"
              class="border border-gray-400 w-2/4"
              required
            />
          </div>
          <small
            class="text-red-500"
            *ngIf="createdAt.invalid && formDir.submitted"
            >Data não pode ser maior que a data atual!</small
          >
          <div class="mb-2 flex flex-row items-center">
            <label class="text-sm mr-1" for="date">Data</label>
            <input
              type="date"
              formControlName="createdAt"
              class="h-6 border w-2/3 border-gray-400"
              required
            />
          </div>
        </div>
        <button type="submit" class="btn-green py-1 text-lg px-4">
          Novo registro!
        </button>
      </form>
    </div>
  </div>
</div>
