<div
  *ngIf="show"
  class="absolute top-0 left-0 w-screen z-50 h-screen bg-gray-100 bg-opacity-75 flex flex-col justify-center items-center"
>
  <div class="-mt-32 border border-gray-400 shadow bg-gray-50">
    <div
      class="bg-gray-100 border-b py-1 px-2 flex flex-row justify-between text-gray-700 text-center"
    >
      Novo débito
      <button
        (click)="close()"
        type="button"
        class="font-bold hover:text-red-500"
      >
        X
      </button>
    </div>
    <div class="p-5">
      <form
        (ngSubmit)="submit()"
        [formGroup]="debtForm"
        #formDir="ngForm"
        class=""
      >
        <!-- <input type="hidden" formControlName="id"> -->
        <label class="form-label">Débito</label>
        <div
          class="max-w-xlc form-section flex mx-auto my-3 items-baseline justify-evenly flex-row space-y-1"
        >
          <div class="flex items-baseline">
            <label class="text-sm text-right mr-2" for="description"
              >Valor</label
            >
            <div class="flex flex-col">
              <input
                type="text"
                class="border w-full border-gray-400"
                formControlName="description"
                required
              />
              <!-- <small
              class="text-red-500"
              *ngIf="description.invalid && formDir.submitted"
              >Descrição é obrigatória!</small
            > -->
            </div>
          </div>
          <div class="flex items-baseline">
            <label class="w-16 mr-2 text-sm text-right" for="description"
              >Previsão</label
            >
            <div class="flex flex-col">
              <input
                type="text"
                class="border w-full border-gray-400"
                formControlName="description"
                required
              />
              <!-- <small
              class="text-red-500"
              *ngIf="description.invalid && formDir.submitted"
              >Descrição é obrigatória!</small
            > -->
            </div>
          </div>
        </div>
        <div class="flex flex-row items-start justify-center">
          <div class="max-w-xl form-section mr-2 flex-col space-y-1">
            <label class="form-label -mt-5">Cliente</label>
            <div class="flex items-baseline">
              <label class="w-16 text-sm text-right mr-2" for="description"
                >Nome</label
              >
              <div class="flex flex-col">
                <input
                  type="text"
                  class="border w-full border-gray-400"
                  formControlName="description"
                  required
                />
                <!-- <small
                class="text-red-500"
                *ngIf="description.invalid && formDir.submitted"
                >Descrição é obrigatória!</small
              > -->
              </div>
            </div>
            <div class="flex items-baseline">
              <label class="w-16 text-sm text-right mr-2" for="description"
                >Telefone</label
              >
              <div class="flex flex-col">
                <input
                  type="text"
                  class="border w-full border-gray-400"
                  formControlName="description"
                  required
                />
                <!-- <small
                class="text-red-500"
                *ngIf="description.invalid && formDir.submitted"
                >Descrição é obrigatória!</small
              > -->
              </div>
            </div>

            <div class="flex items-baseline">
              <label class="w-16 text-sm text-right mr-2" for="description"
                >CPF/CNPJ</label
              >
              <div class="flex flex-col">
                <input
                  type="text"
                  class="border w-full border-gray-400"
                  formControlName="description"
                  required
                />
                <!-- <small
                class="text-red-500"
                *ngIf="description.invalid && formDir.submitted"
                >Descrição é obrigatória!</small
              > -->
              </div>
            </div>
          </div>
          <div class="max-w-xl form-section ml-2 flex-col space-y-1">
            <label class="form-label -mt-5">Endereço</label>
            <div class="flex items-baseline">
              <label class="w-16 text-sm text-right mr-2" for="description"
                >Rua</label
              >
              <div class="flex flex-col">
                <input
                  type="text"
                  class="border w-full border-gray-400"
                  formControlName="description"
                  required
                />
                <!-- <small
                class="text-red-500"
                *ngIf="description.invalid && formDir.submitted"
                >Descrição é obrigatória!</small
              > -->
              </div>
            </div>
            <div class="flex items-baseline">
              <label class="w-16 text-sm text-right mr-2" for="description"
                >Número</label
              >
              <div class="flex flex-col">
                <input
                  type="text"
                  class="border w-full border-gray-400"
                  formControlName="description"
                  required
                />
                <!-- <small
                class="text-red-500"
                *ngIf="description.invalid && formDir.submitted"
                >Descrição é obrigatória!</small
              > -->
              </div>
            </div>
            <div class="flex items-baseline">
              <label class="w-16 text-sm text-right mr-2" for="description"
                >Compl.</label
              >
              <div class="flex flex-col">
                <input
                  type="text"
                  class="border w-full border-gray-400"
                  formControlName="description"
                  required
                />
                <!-- <small
                class="text-red-500"
                *ngIf="description.invalid && formDir.submitted"
                >Descrição é obrigatória!</small
              > -->
              </div>
            </div>
            <div class="flex items-baseline">
              <label class="w-16 text-sm text-right mr-2" for="description"
                >Bairro</label
              >
              <div class="flex flex-col">
                <input
                  type="text"
                  class="border w-full border-gray-400"
                  formControlName="description"
                  required
                />
                <!-- <small
                class="text-red-500"
                *ngIf="description.invalid && formDir.submitted"
                >Descrição é obrigatória!</small
              > -->
              </div>
            </div>
            <div class="flex items-baseline">
              <label class="w-16 text-sm text-right mr-2" for="description"
                >Cidade</label
              >
              <div class="flex flex-col">
                <input
                  type="text"
                  class="border w-full border-gray-400"
                  formControlName="description"
                  required
                />
                <!-- <small
                class="text-red-500"
                *ngIf="description.invalid && formDir.submitted"
                >Descrição é obrigatória!</small
              > -->
              </div>
            </div>
            <div class="flex items-baseline">
              <label class="w-16 text-sm text-right mr-2" for="description"
                >Estado</label
              >
              <div class="flex flex-col">
                <input
                  type="text"
                  class="border w-full border-gray-400"
                  formControlName="description"
                  required
                />
                <!-- <small
                class="text-red-500"
                *ngIf="description.invalid && formDir.submitted"
                >Descrição é obrigatória!</small
              > -->
              </div>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-green w-full mt-2 py-1 text-lg px-4">
          Registrar débito!
        </button>
      </form>
    </div>
  </div>
</div>
